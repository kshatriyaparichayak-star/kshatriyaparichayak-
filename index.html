<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>राजपूत - क्षत्रिय परिचायक</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <style>
        .search-box { width: 100%; padding: 12px; margin: 10px 0; border-radius: 25px; border: 1px solid #ff8c00; outline: none; box-sizing: border-box; }
        .logout-link { color: #fff; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 15px; text-decoration: none; font-size: 14px; cursor: pointer; border: none; }
        .edit-btn { background: #3498db; color: white; border: none; padding: 6px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .form-section { border-bottom: 1px solid #eee; padding: 10px 0; margin-bottom: 10px; font-weight: bold; color: #ff8c00; }
        .input-field { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        /* फोटो अपलोड बटन का स्टाइल */
        input[type="file"] { padding: 8px; background: #fff3e0; border: 1px dashed #ff8c00; }
    </style>
</head>
<body>

    <header style="display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative;">
        <button id="logout-btn-header" class="logout-link" style="position: absolute; right: 10px; top: 10px; display: none;">निकास</button>
        <img src="logo.png" alt="logo" style="width: 70px; height: auto; margin-bottom: 5px;">
        <h1 style="margin: 0; font-size: 22px;">क्षत्रिय परिचायक</h1>
    </header>

    <div id="app">
        <div id="login-card" class="welcome-card" style="text-align: center; margin: 20px; padding: 20px; border-radius: 15px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <h2>स्वागत है!</h2>
            <p>समाज से जुड़ने के लिए लॉगिन करें</p>
            <button id="login-btn" class="btn-primary" style="margin-top:15px;">Google लॉगिन</button>
        </div>

        <div id="profile-container" style="display: none; padding: 15px;">
            <div class="profile-card" style="background: white; padding: 20px; border-radius: 15px; border-top: 5px solid #ff8c00;">
                <h3 style="color: #ff8c00; text-align: center;">सदस्यता फॉर्म</h3>
                
                <p style="font-size: 13px; color: #333; margin-bottom: 5px; font-weight: 600;">अपनी प्रोफाइल फोटो चुनें</p>
                <input type="file" id="user-photo-file" class="input-field" accept="image/*">
                <input type="hidden" id="user-photo-url"> <input type="text" id="user-name" class="input-field" placeholder="पूरा नाम *">
                <input type="text" id="user-father" class="input-field" placeholder="पिता का नाम">
                <p style="font-size: 12px; color: grey; margin-top: 5px;">जन्म तिथि (उम्र के लिए)</p>
                <input type="date" id="user-dob" class="input-field">
                
                <input type="text" id="user-gotra" class="input-field" placeholder="गोत्र *">
                <input type="tel" id="user-phone" class="input-field" placeholder="मोबाइल नंबर *">
                
                <select id="user-blood" class="input-field">
                    <option value="">ब्लड ग्रुप चुनें</option>
                    <option value="A+">A+</option><option value="A-">A-</option>
                    <option value="B+">B+</option><option value="B-">B-</option>
                    <option value="O+">O+</option><option value="O-">O-</option>
                    <option value="AB+">AB+</option><option value="AB-">AB-</option>
                </select>

                <input type="text" id="user-profession" class="input-field" placeholder="व्यवसाय (Profession)">

                <div class="form-section">मूल निवास</div>
                <input type="text" id="mul-gram" class="input-field" placeholder="ग्राम / मोहल्ला">
                <input type="text" id="mul-dist" class="input-field" placeholder="जिला">
                <input type="text" id="mul-state" class="input-field" placeholder="राज्य">

                <div class="form-section">वर्तमान निवास</div>
                <input type="text" id="cur-gram" class="input-field" placeholder="ग्राम / मोहल्ला">
                <input type="text" id="cur-dist" class="input-field" placeholder="जिला *">
                <input type="text" id="cur-state" class="input-field" placeholder="राज्य">

                <button id="save-profile-btn" class="btn-primary" style="width: 100%; padding: 12px; background: #ff8c00; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer;">प्रोफाइल सुरक्षित करें</button>
                <button id="cancel-edit-btn" style="display:none; width:100%; margin-top:15px; background:none; border:none; color:grey; font-size:14px; cursor:pointer;">वापस जाएँ (Cancel)</button>
            </div>
        </div>

        <div id="dashboard-container" style="display: none; padding: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <h2 style="color: #ff8c00; margin: 0; font-size: 18px;">समाज के सदस्य</h2>
                <button id="edit-profile-btn" class="edit-btn">✏️ प्रोफाइल बदलें</button>
            </div>
            <input type="text" id="searchInput" class="search-box" placeholder="नाम, गाँव या जिला से खोजें...">
            <div id="users-list"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
